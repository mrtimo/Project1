<svg width="100%" viewBox="0 0 680 580" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Code flow through Python functions</title>
<desc>Diagram showing how handle_customer_message calls classify_message, then routes to lookup_order, lookup_ticket, RAG retriever, or escalate_to_human, then calls the LLM response chain, and finally save_to_memory.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<style>
.t{font-family:var(--font-sans,"Anthropic Sans",sans-serif);font-size:14px;fill:var(--color-text-primary,#3d3d3a)}
.ts{font-family:var(--font-sans,"Anthropic Sans",sans-serif);font-size:12px;fill:var(--color-text-secondary,#73726c)}
.th{font-family:var(--font-sans,"Anthropic Sans",sans-serif);font-size:14px;font-weight:500;fill:var(--color-text-primary,#3d3d3a)}
.tm{font-family:var(--font-mono,"monospace");font-size:12px;fill:var(--color-text-primary,#3d3d3a)}
.box{fill:var(--color-background-secondary,#f5f4f0);stroke:var(--color-border-tertiary,rgba(0,0,0,0.15))}
.arr{stroke:var(--color-border-secondary,rgba(0,0,0,0.3));stroke-width:1.5;fill:none}
.leader{stroke:var(--color-border-tertiary,rgba(0,0,0,0.15));stroke-width:0.5;stroke-dasharray:4 3;fill:none}
.c-teal rect{fill:#E1F5EE;stroke:#0F6E56;stroke-width:0.5}
.c-teal .th{fill:#085041}.c-teal .ts{fill:#0F6E56}.c-teal .tm{fill:#085041}
.c-purple rect{fill:#EEEDFE;stroke:#534AB7;stroke-width:0.5}
.c-purple .th{fill:#3C3489}.c-purple .ts{fill:#534AB7}.c-purple .tm{fill:#3C3489}
.c-coral rect{fill:#FAECE7;stroke:#993C1D;stroke-width:0.5}
.c-coral .th{fill:#712B13}.c-coral .ts{fill:#993C1D}.c-coral .tm{fill:#712B13}
.c-blue rect{fill:#E6F1FB;stroke:#185FA5;stroke-width:0.5}
.c-blue .th{fill:#0C447C}.c-blue .ts{fill:#185FA5}.c-blue .tm{fill:#0C447C}
.c-amber rect{fill:#FAEEDA;stroke:#854F0B;stroke-width:0.5}
.c-amber .th{fill:#633806}.c-amber .ts{fill:#854F0B}.c-amber .tm{fill:#633806}
.c-green rect{fill:#EAF3DE;stroke:#3B6D11;stroke-width:0.5}
.c-green .th{fill:#27500A}.c-green .ts{fill:#3B6D11}.c-green .tm{fill:#27500A}
.c-red rect{fill:#FCEBEB;stroke:#A32D2D;stroke-width:0.5}
.c-red .th{fill:#791F1F}.c-red .ts{fill:#A32D2D}.c-red .tm{fill:#791F1F}
.c-gray rect{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:0.5}
.c-gray .th{fill:#444441}.c-gray .ts{fill:#5F5E5A}.c-gray .tm{fill:#444441}
@media(prefers-color-scheme:dark){
.t{fill:#c2c0b6}.ts{fill:#9c9a92}.th{fill:#e8e6de}.tm{fill:#c2c0b6}
.box{fill:#2c2c2a;stroke:rgba(255,255,255,0.15)}
.arr{stroke:rgba(255,255,255,0.3)}.leader{stroke:rgba(255,255,255,0.15)}
.c-teal rect{fill:#085041;stroke:#5DCAA5}.c-teal .th{fill:#E1F5EE}.c-teal .ts{fill:#9FE1CB}.c-teal .tm{fill:#E1F5EE}
.c-purple rect{fill:#3C3489;stroke:#AFA9EC}.c-purple .th{fill:#EEEDFE}.c-purple .ts{fill:#CECBF6}.c-purple .tm{fill:#EEEDFE}
.c-coral rect{fill:#712B13;stroke:#F0997B}.c-coral .th{fill:#FAECE7}.c-coral .ts{fill:#F5C4B3}.c-coral .tm{fill:#FAECE7}
.c-blue rect{fill:#0C447C;stroke:#85B7EB}.c-blue .th{fill:#E6F1FB}.c-blue .ts{fill:#B5D4F4}.c-blue .tm{fill:#E6F1FB}
.c-amber rect{fill:#633806;stroke:#EF9F27}.c-amber .th{fill:#FAEEDA}.c-amber .ts{fill:#FAC775}.c-amber .tm{fill:#FAEEDA}
.c-green rect{fill:#27500A;stroke:#97C459}.c-green .th{fill:#EAF3DE}.c-green .ts{fill:#C0DD97}.c-green .tm{fill:#EAF3DE}
.c-red rect{fill:#791F1F;stroke:#F09595}.c-red .th{fill:#FCEBEB}.c-red .ts{fill:#F7C1C1}.c-red .tm{fill:#FCEBEB}
.c-gray rect{fill:#444441;stroke:#B4B2A9}.c-gray .th{fill:#F1EFE8}.c-gray .ts{fill:#D3D1C7}.c-gray .tm{fill:#F1EFE8}
}
</style>

<rect x="40" y="10" width="600" height="560" rx="16" fill="none" stroke="var(--color-border-tertiary,rgba(0,0,0,0.15))" stroke-width="0.5" stroke-dasharray="6 4"/>
<text class="th" x="340" y="34" text-anchor="middle" dominant-baseline="central">handle_customer_message(message)</text>

<text class="ts" x="60" y="68">Step 1: classify</text>
<g class="c-purple">
<rect x="60" y="78" width="250" height="56" rx="8"/>
<text class="tm" x="185" y="98" text-anchor="middle" dominant-baseline="central">classify_message(msg)</text>
<text class="ts" x="185" y="116" text-anchor="middle" dominant-baseline="central">classifier_prompt | llm</text>
</g>
<text class="ts" x="330" y="98" text-anchor="start">Returns: ORDER_STATUS</text>
<text class="ts" x="330" y="112" text-anchor="start">TICKET_STATUS, KNOWLEDGE_BASE</text>
<text class="ts" x="330" y="126" text-anchor="start">or ESCALATION</text>

<line x1="185" y1="134" x2="185" y2="160" class="arr" marker-end="url(#arrow)"/>

<text class="ts" x="60" y="175">Step 2: route to the right tool</text>

<path d="M185 186 L110 186 L110 210" class="arr" fill="none" marker-end="url(#arrow)"/>
<path d="M185 186 L265 186 L265 210" class="arr" fill="none" marker-end="url(#arrow)"/>
<path d="M185 186 L420 186 L420 210" class="arr" fill="none" marker-end="url(#arrow)"/>
<path d="M185 186 L565 186 L565 210" class="arr" fill="none" marker-end="url(#arrow)"/>

<g class="c-blue">
<rect x="50" y="212" width="120" height="70" rx="8"/>
<text class="tm" x="110" y="232" text-anchor="middle" dominant-baseline="central">lookup_order</text>
<text class="ts" x="110" y="250" text-anchor="middle" dominant-baseline="central">extract_order_id</text>
<text class="ts" x="110" y="266" text-anchor="middle" dominant-baseline="central">requests.get()</text>
</g>

<g class="c-coral">
<rect x="200" y="212" width="130" height="70" rx="8"/>
<text class="tm" x="265" y="232" text-anchor="middle" dominant-baseline="central">lookup_ticket</text>
<text class="ts" x="265" y="250" text-anchor="middle" dominant-baseline="central">extract_ticket_info</text>
<text class="ts" x="265" y="266" text-anchor="middle" dominant-baseline="central">pd.read_csv()</text>
</g>

<g class="c-green">
<rect x="358" y="212" width="124" height="70" rx="8"/>
<text class="tm" x="420" y="232" text-anchor="middle" dominant-baseline="central">RAG retriever</text>
<text class="ts" x="420" y="250" text-anchor="middle" dominant-baseline="central">vectorstore</text>
<text class="ts" x="420" y="266" text-anchor="middle" dominant-baseline="central">.as_retriever()</text>
</g>

<g class="c-red">
<rect x="504" y="212" width="122" height="70" rx="8"/>
<text class="tm" x="565" y="232" text-anchor="middle" dominant-baseline="central">escalate_to</text>
<text class="tm" x="565" y="248" text-anchor="middle" dominant-baseline="central">_human</text>
<text class="ts" x="565" y="266" text-anchor="middle" dominant-baseline="central">csv.writer()</text>
</g>

<path d="M110 282 L110 320 L260 320" class="arr" fill="none"/>
<path d="M265 282 L265 320 L260 320" class="arr" fill="none"/>
<path d="M420 282 L420 320 L390 320" class="arr" fill="none"/>
<path d="M565 282 L565 320 L390 320" class="arr" fill="none"/>

<text class="ts" x="190" y="310">context =</text>
<text class="ts" x="440" y="310">context =</text>

<line x1="340" y1="330" x2="340" y2="354" class="arr" marker-end="url(#arrow)"/>

<text class="ts" x="60" y="367">Step 3: generate response</text>

<g class="c-purple">
<rect x="160" y="376" width="360" height="56" rx="8"/>
<text class="tm" x="340" y="396" text-anchor="middle" dominant-baseline="central">response_chain.invoke({context, message})</text>
<text class="ts" x="340" y="414" text-anchor="middle" dominant-baseline="central">response_prompt | llm → extract_text()</text>
</g>

<line x1="340" y1="432" x2="340" y2="454" class="arr" marker-end="url(#arrow)"/>

<text class="ts" x="60" y="468">Step 4: log conversation</text>

<g class="c-amber">
<rect x="180" y="478" width="320" height="56" rx="8"/>
<text class="tm" x="340" y="498" text-anchor="middle" dominant-baseline="central">save_to_memory(msg, response, category)</text>
<text class="ts" x="340" y="516" text-anchor="middle" dominant-baseline="central">Appends row to memory.csv</text>
</g>

<line x1="340" y1="534" x2="340" y2="556" class="arr" marker-end="url(#arrow)"/>
<text class="th" x="340" y="568" text-anchor="middle" dominant-baseline="central">return bot_response</text>

</svg>
