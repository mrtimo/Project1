<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Customer support bot architecture</title>
<desc>Diagram showing how user questions flow from Gradio through the classifier to different external APIs and data sources, then back to the user.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<style>
.t{font-family:var(--font-sans,"Anthropic Sans",sans-serif);font-size:14px;fill:var(--color-text-primary,#3d3d3a)}
.ts{font-family:var(--font-sans,"Anthropic Sans",sans-serif);font-size:12px;fill:var(--color-text-secondary,#73726c)}
.th{font-family:var(--font-sans,"Anthropic Sans",sans-serif);font-size:14px;font-weight:500;fill:var(--color-text-primary,#3d3d3a)}
.box{fill:var(--color-background-secondary,#f5f4f0);stroke:var(--color-border-tertiary,rgba(0,0,0,0.15))}
.arr{stroke:var(--color-border-secondary,rgba(0,0,0,0.3));stroke-width:1.5;fill:none}
.leader{stroke:var(--color-border-tertiary,rgba(0,0,0,0.15));stroke-width:0.5;stroke-dasharray:4 3;fill:none}
.c-teal rect{fill:#E1F5EE;stroke:#0F6E56;stroke-width:0.5}
.c-teal .th{fill:#085041}.c-teal .ts{fill:#0F6E56}
.c-purple rect{fill:#EEEDFE;stroke:#534AB7;stroke-width:0.5}
.c-purple .th{fill:#3C3489}.c-purple .ts{fill:#534AB7}
.c-coral rect{fill:#FAECE7;stroke:#993C1D;stroke-width:0.5}
.c-coral .th{fill:#712B13}.c-coral .ts{fill:#993C1D}
.c-blue rect{fill:#E6F1FB;stroke:#185FA5;stroke-width:0.5}
.c-blue .th{fill:#0C447C}.c-blue .ts{fill:#185FA5}
.c-amber rect{fill:#FAEEDA;stroke:#854F0B;stroke-width:0.5}
.c-amber .th{fill:#633806}.c-amber .ts{fill:#854F0B}
.c-green rect{fill:#EAF3DE;stroke:#3B6D11;stroke-width:0.5}
.c-green .th{fill:#27500A}.c-green .ts{fill:#3B6D11}
.c-red rect{fill:#FCEBEB;stroke:#A32D2D;stroke-width:0.5}
.c-red .th{fill:#791F1F}.c-red .ts{fill:#A32D2D}
.c-gray rect{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:0.5}
.c-gray .th{fill:#444441}.c-gray .ts{fill:#5F5E5A}
@media(prefers-color-scheme:dark){
.t{fill:#c2c0b6}.ts{fill:#9c9a92}.th{fill:#e8e6de}
.box{fill:#2c2c2a;stroke:rgba(255,255,255,0.15)}
.arr{stroke:rgba(255,255,255,0.3)}.leader{stroke:rgba(255,255,255,0.15)}
.c-teal rect{fill:#085041;stroke:#5DCAA5}.c-teal .th{fill:#E1F5EE}.c-teal .ts{fill:#9FE1CB}
.c-purple rect{fill:#3C3489;stroke:#AFA9EC}.c-purple .th{fill:#EEEDFE}.c-purple .ts{fill:#CECBF6}
.c-coral rect{fill:#712B13;stroke:#F0997B}.c-coral .th{fill:#FAECE7}.c-coral .ts{fill:#F5C4B3}
.c-blue rect{fill:#0C447C;stroke:#85B7EB}.c-blue .th{fill:#E6F1FB}.c-blue .ts{fill:#B5D4F4}
.c-amber rect{fill:#633806;stroke:#EF9F27}.c-amber .th{fill:#FAEEDA}.c-amber .ts{fill:#FAC775}
.c-green rect{fill:#27500A;stroke:#97C459}.c-green .th{fill:#EAF3DE}.c-green .ts{fill:#C0DD97}
.c-red rect{fill:#791F1F;stroke:#F09595}.c-red .th{fill:#FCEBEB}.c-red .ts{fill:#F7C1C1}
.c-gray rect{fill:#444441;stroke:#B4B2A9}.c-gray .th{fill:#F1EFE8}.c-gray .ts{fill:#D3D1C7}
}
</style>

<g class="c-teal">
<rect x="250" y="20" width="180" height="56" rx="8"/>
<text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central">Gradio chat UI</text>
<text class="ts" x="340" y="58" text-anchor="middle" dominant-baseline="central">User types question</text>
</g>

<line x1="340" y1="76" x2="340" y2="110" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple">
<rect x="230" y="112" width="220" height="56" rx="8"/>
<text class="th" x="340" y="132" text-anchor="middle" dominant-baseline="central">Gemini LLM classifier</text>
<text class="ts" x="340" y="150" text-anchor="middle" dominant-baseline="central">Decides question category</text>
</g>

<line x1="200" y1="140" x2="130" y2="140" class="leader"/>
<text class="ts" x="125" y="135" text-anchor="end">API call to</text>
<text class="ts" x="125" y="149" text-anchor="end">Google AI Studio</text>

<line x1="165" y1="168" x2="165" y2="240" class="arr" marker-end="url(#arrow)"/>
<line x1="310" y1="168" x2="310" y2="240" class="arr" marker-end="url(#arrow)"/>
<line x1="460" y1="168" x2="460" y2="240" class="arr" marker-end="url(#arrow)"/>
<line x1="595" y1="168" x2="595" y2="240" class="arr" marker-end="url(#arrow)"/>

<path d="M230 168 L165 168" class="arr" fill="none"/>
<path d="M340 168 L310 168" class="arr" fill="none"/>
<path d="M380 168 L460 168" class="arr" fill="none"/>
<path d="M450 168 L595 168" class="arr" fill="none"/>

<text class="ts" x="165" y="210" text-anchor="middle">order</text>
<text class="ts" x="310" y="210" text-anchor="middle">ticket</text>
<text class="ts" x="460" y="210" text-anchor="middle">knowledge</text>
<text class="ts" x="595" y="210" text-anchor="middle">escalation</text>

<g class="c-blue">
<rect x="90" y="242" width="150" height="56" rx="8"/>
<text class="th" x="165" y="262" text-anchor="middle" dominant-baseline="central">DummyJSON API</text>
<text class="ts" x="165" y="280" text-anchor="middle" dominant-baseline="central">dummyjson.com</text>
</g>

<g class="c-coral">
<rect x="252" y="242" width="116" height="56" rx="8"/>
<text class="th" x="310" y="262" text-anchor="middle" dominant-baseline="central">Ticket CSV</text>
<text class="ts" x="310" y="280" text-anchor="middle" dominant-baseline="central">Local file</text>
</g>

<g class="c-green">
<rect x="385" y="242" width="150" height="56" rx="8"/>
<text class="th" x="460" y="262" text-anchor="middle" dominant-baseline="central">ChromaDB</text>
<text class="ts" x="460" y="280" text-anchor="middle" dominant-baseline="central">Vector search</text>
</g>

<g class="c-red">
<rect x="545" y="242" width="100" height="56" rx="8"/>
<text class="th" x="595" y="262" text-anchor="middle" dominant-baseline="central">Escalation</text>
<text class="ts" x="595" y="280" text-anchor="middle" dominant-baseline="central">Log to CSV</text>
</g>

<line x1="460" y1="298" x2="460" y2="330" class="leader"/>
<g class="c-gray">
<rect x="395" y="332" width="130" height="44" rx="8"/>
<text class="th" x="460" y="354" text-anchor="middle" dominant-baseline="central">.md files (RAG)</text>
</g>
<text class="ts" x="540" y="354" text-anchor="start">Recycling docs</text>

<line x1="165" y1="298" x2="165" y2="340" class="arr"/>
<line x1="310" y1="298" x2="310" y2="340" class="arr"/>
<line x1="460" y1="376" x2="460" y2="400" class="arr"/>
<line x1="595" y1="298" x2="595" y2="340" class="arr"/>

<path d="M165 340 L165 410 L270 410" class="arr" fill="none"/>
<path d="M310 340 L310 410 L270 410" class="arr" fill="none"/>
<path d="M460 400 L460 410 L400 410" class="arr" fill="none"/>
<path d="M595 340 L595 410 L400 410" class="arr" fill="none"/>

<g class="c-purple">
<rect x="270" y="390" width="130" height="56" rx="8"/>
<text class="th" x="335" y="410" text-anchor="middle" dominant-baseline="central">Gemini LLM</text>
<text class="ts" x="335" y="428" text-anchor="middle" dominant-baseline="central">Generate response</text>
</g>

<line x1="335" y1="446" x2="335" y2="470" class="arr" marker-end="url(#arrow)"/>

<g class="c-amber">
<rect x="255" y="472" width="160" height="44" rx="8"/>
<text class="th" x="335" y="494" text-anchor="middle" dominant-baseline="central">Save to memory.csv</text>
</g>

<line x1="420" y1="494" x2="460" y2="494" class="arr"/>
<text class="ts" x="465" y="490" text-anchor="start">Log conversation</text>
<text class="ts" x="465" y="504" text-anchor="start">for record-keeping</text>

</svg>
